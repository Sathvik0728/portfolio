<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Message Sent</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
font-family:Poppins;
color:white;
}

.container{
text-align:center;
background:#1e293b;
padding:60px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
animation:fadeIn 1s ease;
}

h1{
color:#38bdf8;
margin-bottom:10px;
}

p{
color:#cbd5f5;
margin-bottom:30px;
}

a{
text-decoration:none;
background:#38bdf8;
color:black;
padding:12px 25px;
border-radius:8px;
font-weight:600;
transition:0.3s;
}

a:hover{
background:#0ea5e9;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="container">

<h1>Message Sent Successfully!</h1>

<p>Thank you for contacting me. I will get back to you soon.</p>

<a href="index.html">Back to Home</a>

</div>

</body>

</html>
